<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Diamond Lattice Background Pattern -->
  <defs>
    <style>
      .taupe { fill: none; stroke: #8C7A6B; }
      .gold-light { fill: none; stroke: #D4A853; }
    </style>
    <pattern id="diamond" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <!-- Diamond shapes -->
      <path d="M20,2 L38,20 L20,38 L2,20Z" class="taupe" stroke-width="0.8" opacity="0.3"/>
      <path d="M20,6 L34,20 L20,34 L6,20Z" class="gold-light" stroke-width="0.5" opacity="0.2"/>
      <!-- Small center dot -->
      <circle cx="20" cy="20" r="1.5" fill="#D4A853" opacity="0.25"/>
      <!-- Connecting lines -->
      <line x1="0" y1="20" x2="40" y2="20" class="taupe" stroke-width="0.3" opacity="0.15"/>
      <line x1="20" y1="0" x2="20" y2="40" class="taupe" stroke-width="0.3" opacity="0.15"/>
    </pattern>
  </defs>
  <rect width="100" height="100" fill="url(#diamond)"/>
</svg>