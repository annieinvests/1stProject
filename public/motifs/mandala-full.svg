<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <!-- Full Mandala Pattern -->
  <defs>
    <style>
      .g1 { fill: none; stroke: #D4A853; stroke-width: 1.5; }
      .g2 { fill: none; stroke: #D4A853; stroke-width: 1; }
      .g3 { fill: none; stroke: #6B2D3E; stroke-width: 1.2; }
      .g4 { fill: none; stroke: #8C7A6B; stroke-width: 0.8; }
      .gold-fill { fill: #D4A853; }
      .burgundy-fill { fill: #6B2D3E; }
      .cream-fill { fill: #FFF8F0; }
      .taupe-fill { fill: #8C7A6B; }
    </style>
  </defs>
  <!-- Outer ring -->
  <circle cx="200" cy="200" r="190" class="g1"/>
  <circle cx="200" cy="200" r="180" class="g2"/>
  <!-- Outer petal ring -->
  <g class="g3">
    <path d="M200,20 Q230,60 200,200 Q170,60 200,20Z" transform="rotate(0 200 200)"/>
    <path d="M200,20 Q230,60 200,200 Q170,60 200,20Z" transform="rotate(30 200 200)"/>
    <path d="M200,20 Q230,60 200,200 Q170,60 200,20Z" transform="rotate(60 200 200)"/>
    <path d="M200,20 Q230,60 200,200 Q170,60 200,20Z" transform="rotate(90 200 200)"/>
    <path d="M200,20 Q230,60 200,200 Q170,60 200,20Z" transform="rotate(120 200 200)"/>
    <path d="M200,20 Q230,60 200,200 Q170,60 200,20Z" transform="rotate(150 200 200)"/>
    <path d="M200,20 Q230,60 200,200 Q170,60 200,20Z" transform="rotate(180 200 200)"/>
    <path d="M200,20 Q230,60 200,200 Q170,60 200,20Z" transform="rotate(210 200 200)"/>
    <path d="M200,20 Q230,60 200,200 Q170,60 200,20Z" transform="rotate(240 200 200)"/>
    <path d="M200,20 Q230,60 200,200 Q170,60 200,20Z" transform="rotate(270 200 200)"/>
    <path d="M200,20 Q230,60 200,200 Q170,60 200,20Z" transform="rotate(300 200 200)"/>
    <path d="M200,20 Q230,60 200,200 Q170,60 200,20Z" transform="rotate(330 200 200)"/>
  </g>
  <!-- Middle rings -->
  <circle cx="200" cy="200" r="160" class="g4"/>
  <circle cx="200" cy="200" r="145" class="g1" opacity="0.6"/>
  <!-- Middle decorative band -->
  <g class="g2" opacity="0.5">
    <circle cx="200" cy="55" r="8"/>
    <circle cx="255" cy="80" r="8"/>
    <circle cx="273" cy="145" r="8"/>
    <circle cx="255" cy="200" r="8"/>
    <circle cx="273" cy="255" r="8"/>
    <circle cx="255" cy="320" r="8"/>
    <circle cx="200" cy="345" r="8"/>
    <circle cx="145" cy="320" r="8"/>
    <circle cx="127" cy="255" r="8"/>
    <circle cx="145" cy="200" r="8"/>
    <circle cx="127" cy="145" r="8"/>
    <circle cx="145" cy="80" r="8"/>
  </g>
  <!-- Inner ring -->
  <circle cx="200" cy="200" r="125" class="g3"/>
  <circle cx="200" cy="200" r="110" class="g2"/>
  <!-- Inner petal ring -->
  <g class="g4" opacity="0.7">
    <path d="M200,90 Q215,110 200,200 Q185,110 200,90Z" transform="rotate(0 200 200)"/>
    <path d="M200,90 Q215,110 200,200 Q185,110 200,90Z" transform="rotate(45 200 200)"/>
    <path d="M200,90 Q215,110 200,200 Q185,110 200,90Z" transform="rotate(90 200 200)"/>
    <path d="M200,90 Q215,110 200,200 Q185,110 200,90Z" transform="rotate(135 200 200)"/>
    <path d="M200,90 Q215,110 200,200 Q185,110 200,90Z" transform="rotate(180 200 200)"/>
    <path d="M200,90 Q215,110 200,200 Q185,110 200,90Z" transform="rotate(225 200 200)"/>
    <path d="M200,90 Q215,110 200,200 Q185,110 200,90Z" transform="rotate(270 200 200)"/>
    <path d="M200,90 Q215,110 200,200 Q185,110 200,90Z" transform="rotate(315 200 200)"/>
  </g>
  <!-- Inner rings -->
  <circle cx="200" cy="200" r="80" class="g1"/>
  <circle cx="200" cy="200" r="65" class="g4"/>
  <circle cx="200" cy="200" r="50" class="g2"/>
  <!-- Center flower -->
  <g class="gold-fill" opacity="0.4">
    <ellipse cx="200" cy="180" rx="10" ry="20"/>
    <ellipse cx="200" cy="180" rx="10" ry="20" transform="rotate(60 200 200)"/>
    <ellipse cx="200" cy="180" rx="10" ry="20" transform="rotate(120 200 200)"/>
  </g>
  <!-- Center dot -->
  <circle cx="200" cy="200" r="12" class="burgundy-fill" opacity="0.3"/>
  <circle cx="200" cy="200" r="5" class="gold-fill" opacity="0.5"/>
</svg>