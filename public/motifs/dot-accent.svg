<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 24" width="100" height="24">
  <!-- Decorative Dot Accents - for bullets, separators, micro-patterns -->
  <defs>
    <style>
      .gold-dot { fill: #D4A853; }
      .burgundy-dot { fill: #6B2D3E; }
      .taupe-dot { fill: #8C7A6B; }
      .gold-line { fill: none; stroke: #D4A853; }
      .burgundy-line { fill: none; stroke: #6B2D3E; }
    </style>

    <!-- Pattern 1: Three dots (separator) -->
    <g id="separator-dots">
      <circle cx="10" cy="12" r="2" class="gold-dot" opacity="0.6"/>
      <circle cx="20" cy="12" r="3" class="burgundy-dot" opacity="0.5"/>
      <circle cx="30" cy="12" r="2" class="gold-dot" opacity="0.6"/>
    </g>

    <!-- Pattern 2: Line with dot (section divider) -->
    <g id="line-dot-divider">
      <line x1="0" y1="12" x2="12" y2="12" class="gold-line" stroke-width="1" opacity="0.4"/>
      <circle cx="15" cy="12" r="2.5" class="gold-dot" opacity="0.5"/>
      <line x1="20" y1="12" x2="32" y2="12" class="gold-line" stroke-width="1" opacity="0.4"/>
      <circle cx="35" cy="12" r="1.5" class="burgundy-dot" opacity="0.4"/>
      <line x1="38" y1="12" x2="50" y2="12" class="gold-line" stroke-width="1" opacity="0.4"/>
    </g>

    <!-- Pattern 3: Diamond dot cluster -->
    <g id="diamond-cluster">
      <circle cx="60" cy="12" r="1.5" class="burgundy-dot" opacity="0.4"/>
      <circle cx="64" cy="8" r="1" class="gold-dot" opacity="0.4"/>
      <circle cx="64" cy="16" r="1" class="gold-dot" opacity="0.4"/>
      <circle cx="68" cy="12" r="2" class="burgundy-dot" opacity="0.5"/>
      <circle cx="72" cy="8" r="1" class="gold-dot" opacity="0.4"/>
      <circle cx="72" cy="16" r="1" class="gold-dot" opacity="0.4"/>
      <circle cx="76" cy="12" r="1.5" class="burgundy-dot" opacity="0.4"/>
    </g>
  </defs>

  <!-- Row 1: Separator dots -->
  <use href="#separator-dots" x="0" y="0"/>

  <!-- Row 2: Line with dot divider -->
  <use href="#line-dot-divider" x="0" y="0"/>

  <!-- Row 3: Diamond cluster -->
  <use href="#diamond-cluster" x="0" y="0"/>
</svg>