<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 30" width="300" height="30">
  <!-- Floral Arabesque Divider -->
  <defs>
    <style>
      .vine { fill: none; stroke: #8BA888; stroke-width: 1.2; }
      .vine-light { fill: none; stroke: #8BA888; stroke-width: 0.8; }
      .gold { fill: #D4A853; }
      .sage { fill: #8BA888; }
      .burgundy { fill: #6B2D3E; }
    </style>
    <!-- Single repeat unit -->
    <g id="arabesque-unit">
      <!-- Main vine curve -->
      <path class="vine" d="M0,15 Q25,5 50,15 Q75,25 100,15"/>
      <!-- Leaves -->
      <ellipse class="sage" cx="25" cy="8" rx="6" ry="3" transform="rotate(-20 25 8)" opacity="0.5"/>
      <ellipse class="sage" cx="50" cy="18" rx="5" ry="2.5" transform="rotate(15 50 18)" opacity="0.5"/>
      <ellipse class="sage" cx="75" cy="8" rx="6" ry="3" transform="rotate(-20 75 8)" opacity="0.5"/>
      <!-- Small flower -->
      <circle cx="50" cy="2" r="2.5" class="gold" opacity="0.5"/>
      <circle cx="50" cy="2" r="1" class="burgundy" opacity="0.4"/>
      <!-- Decorative dots on vine -->
      <circle cx="15" cy="12" r="1.5" class="gold" opacity="0.4"/>
      <circle cx="35" cy="12" r="1" class="sage" opacity="0.3"/>
      <circle cx="65" cy="18" r="1" class="gold" opacity="0.4"/>
      <circle cx="85" cy="12" r="1.5" class="sage" opacity="0.3"/>
    </g>
  </defs>
  <!-- Repeat across width -->
  <use href="#arabesque-unit" x="0"/>
  <use href="#arabesque-unit" x="100"/>
  <use href="#arabesque-unit" x="200"/>
</svg>